<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>十字路口 · 法务助手</title>
    <link rel="icon" href="/static/logo.png">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
</head>
<body>
    <!-- Login overlay -->
    {% if not authenticated %}
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <img src="/static/logo.png" alt="Logo" class="login-logo">
            <h2>十字路口 · 法务助手</h2>
            <p class="login-subtitle">请登录以继续</p>
            <form id="loginForm" class="login-form">
                <input type="text" name="username" placeholder="用户名" class="input-field" autofocus>
                <input type="password" name="password" placeholder="密码" class="input-field">
                <button type="submit" class="btn-primary">登录</button>
            </form>
            <p class="error-text" id="loginError" hidden>用户名或密码错误</p>
        </div>
    </div>
    <script>
    (function() {
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            errorEl.hidden = true;
            const username = form.username.value.trim();
            const password = form.password.value;
            try {
                const resp = await fetch('/api/v1/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                if (resp.ok) {
                    const data = await resp.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    window.location.reload();
                } else {
                    errorEl.hidden = false;
                }
            } catch (err) {
                errorEl.hidden = false;
            }
        });
    })();
    </script>
    {% endif %}

    {% if authenticated %}
    <header class="app-header">
        <div class="header-left">
            <img src="/static/logo.png" alt="Logo" class="header-logo">
            <h1>十字路口 · 法务助手</h1>
        </div>
        <div class="header-right">
            <span class="header-user" id="headerUser"></span>
            <span class="admin-badge" id="adminBadge" hidden>管理员</span>
            <a href="/admin" class="header-admin-link" id="adminLink" hidden>管理后台</a>
            <button class="header-logout" id="logoutBtn">退出</button>
        </div>
    </header>

    <main class="app-main">
        <!-- Left panel: Controls -->
        <aside class="control-panel">
            <!-- Upload PDF/Word -->
            <section class="panel-section">
                <label class="section-label">合同文件</label>
                <div class="upload-zone" id="pdfUploadZone">
                    <input type="file" id="pdfInput" accept=".pdf,.docx,.doc" hidden>
                    <div class="upload-placeholder" id="pdfPlaceholder">
                        <span class="upload-icon">&#128196;</span>
                        <span>拖拽或点击上传 PDF / Word</span>
                    </div>
                    <div class="upload-done" id="pdfDone" hidden>
                        <span class="file-name" id="pdfFileName"></span>
                        <button class="btn-text" id="pdfClear">更换</button>
                    </div>
                </div>
            </section>

            <!-- Stamp Selection -->
            <section class="panel-section">
                <label class="section-label">选择印章</label>
                <div class="stamp-grid" id="stampGrid">
                    <div class="stamp-loading">加载印章中...</div>
                </div>
            </section>

            <!-- Stamp Settings -->
            <section class="panel-section">
                <label class="section-label">盖章设置</label>
                <div class="setting-row">
                    <span>盖章方</span>
                    <div class="party-toggle" id="partyToggle">
                        <button class="party-btn active" data-party="乙方">乙方</button>
                        <button class="party-btn" data-party="甲方">甲方</button>
                    </div>
                </div>
                <div class="setting-row">
                    <span>印章大小</span>
                    <input type="range" id="stampSize" min="20" max="60" value="42" class="slider">
                    <span id="stampSizeVal">42mm</span>
                </div>
                <div class="setting-row">
                    <span>骑缝章</span>
                    <label class="toggle">
                        <input type="checkbox" id="seamToggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </section>

            <!-- Scan Effect -->
            <section class="panel-section">
                <label class="section-label">扫描效果</label>
                <div class="setting-row">
                    <span>效果强度</span>
                    <input type="range" id="scanSlider" min="0" max="100" value="0" class="slider">
                    <span id="scanVal">关闭</span>
                </div>
            </section>

            <!-- Actions -->
            <section class="panel-section">
                <div class="action-main">
                    <button class="btn-primary btn-process" id="processBtn" disabled>
                        <span class="btn-text-inner" id="processBtnText">开始处理</span>
                        <div class="btn-progress" id="btnProgress"></div>
                    </button>
                    <button class="btn-reset" id="newTaskBtn" hidden title="重新开始">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 0 1 10.3-4.2l-1.8 1.8H15V1.1l-1.7 1.7A8 8 0 1 0 15.9 9H14a6 6 0 0 1-12-1Z" fill="currentColor"/></svg>
                    </button>
                </div>
            </section>

            <!-- Status -->
            <div class="status-bar" id="statusBar" hidden>
                <span id="statusText"></span>
            </div>

            <!-- History -->
            <section class="panel-section">
                <label class="section-label">处理记录</label>
                <div class="history-list" id="historyList">
                    <div class="history-empty">暂无记录</div>
                </div>
            </section>
        </aside>

        <!-- Right panel: PDF Preview -->
        <section class="preview-panel">
            <div class="preview-header">
                <span id="previewTitle">上传合同以预览</span>
                <div class="preview-nav" id="previewNav" hidden>
                    <button class="btn-icon" id="prevPage">&lt;</button>
                    <span id="pageInfo">1 / 1</span>
                    <button class="btn-icon" id="nextPage">&gt;</button>
                </div>
            </div>
            <div class="preview-canvas-wrap" id="canvasWrap">
                <canvas id="pdfCanvas"></canvas>
                <div class="stamp-marker" id="stampMarker" hidden>
                    <div class="stamp-marker-ring"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Fireworks canvas -->
    <canvas id="fireworks" onclick="stopFireworks()"></canvas>
    <div class="fw-hint">点击任意位置关闭</div>

    <script src="/static/js/app.js"></script>
    <script>
    // Header user info
    (function() {
        async function loadUserInfo() {
            const token = localStorage.getItem('token');
            const opts = {};
            if (token) {
                opts.headers = { 'Authorization': 'Bearer ' + token };
            }
            try {
                const resp = await fetch('/api/v1/me', opts);
                if (resp.ok) {
                    const data = await resp.json();
                    document.getElementById('headerUser').textContent = data.username;
                    if (data.role === 'admin') {
                        document.getElementById('adminBadge').hidden = false;
                        document.getElementById('adminLink').hidden = false;
                    }
                }
            } catch(e) {}
        }
        loadUserInfo();

        document.getElementById('logoutBtn').addEventListener('click', async function() {
            await fetch('/api/v1/logout', { method: 'POST' });
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/';
        });
    })();
    </script>
    {% endif %}
</body>
</html>
