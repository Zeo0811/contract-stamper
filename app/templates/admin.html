<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
    <meta name="theme-color" content="#407600">
    <title>管理后台 · 十字路口</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/icon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/icons/icon-180x180.png">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="admin-body">
    <header class="app-header">
        <div class="header-left">
            <img src="/static/logo.png" alt="Logo" class="header-logo">
            <h1>十字路口 · 法务助手</h1>
            <span class="admin-header-badge">管理后台</span>
        </div>
        <div class="header-right">
            <a href="/" class="header-back-link"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>返回主页</a>
            <button class="header-logout" id="logoutBtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>退出</button>
        </div>
    </header>

    <div class="admin-container" id="adminContainer">
        <div class="admin-denied" id="adminDenied" hidden>
            <h2>需要管理员权限</h2>
            <p>您的账号没有管理员权限，无法访问此页面。</p>
            <a href="/" class="btn-primary" style="display:inline-flex;margin-top:20px;text-decoration:none;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>返回主页</a>
        </div>

        <div id="adminContent" hidden>
            <section class="admin-section">
                <h2 class="admin-section-title">用户管理</h2>
                <div class="admin-list" id="userList">
                    <div class="admin-list-empty">加载中...</div>
                </div>
                <div class="admin-form">
                    <input type="text" id="newUsername" placeholder="用户名" class="input-field">
                    <input type="password" id="newPassword" placeholder="密码" class="input-field">
                    <select id="newRole" class="input-field admin-select">
                        <option value="user">普通用户</option>
                        <option value="admin">管理员</option>
                    </select>
                    <button class="btn-primary" id="addUserBtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>添加用户</button>
                </div>
            </section>

            <section class="admin-section">
                <h2 class="admin-section-title">印章管理</h2>
                <div class="admin-list" id="stampList">
                    <div class="admin-list-empty">加载中...</div>
                </div>
                <div class="admin-form">
                    <input type="text" id="newCompany" placeholder="公司主体名称" class="input-field">
                    <div class="admin-file-upload">
                        <input type="file" id="stampFileInput" accept=".png,.jpg,.jpeg" hidden>
                        <button class="btn-secondary" id="stampFileBtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>选择印章图片</button>
                        <span class="admin-file-name" id="stampFileName">未选择文件</span>
                    </div>
                    <button class="btn-primary" id="addStampBtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>添加印章</button>
                </div>
            </section>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
